<svg width="500" height="580" viewBox="0 0 500 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bglibscan" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0d1e3a"/>
      <stop offset="100%" stop-color="#060e1e"/>
    </linearGradient>
    <linearGradient id="beamgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.0"/>
      <stop offset="60%" stop-color="#00E5FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="burstgrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%"
      gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="35%" stop-color="#00E5FF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#00B0CC" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="plasmagrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="25%"  stop-color="#00E5FF" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#0077AA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#003355" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00E5FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="hexlibscan">
      <polygon points="250,30 455,145 455,375 250,490 45,375 45,145"/>
    </clipPath>
  </defs>

  <polygon points="250,30 455,145 455,375 250,490 45,375 45,145" fill="url(#bglibscan)"/>

  <g clip-path="url(#hexlibscan)">

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- SUBTLE BACKGROUND — tech grid                         -->
    <!-- ══════════════════════════════════════════════════════ -->
    <line x1="45"  y1="200" x2="455" y2="200" stroke="#1a3a5a" stroke-width="0.4" opacity="0.4"/>
    <line x1="45"  y1="240" x2="455" y2="240" stroke="#1a3a5a" stroke-width="0.4" opacity="0.4"/>
    <line x1="45"  y1="280" x2="455" y2="280" stroke="#1a3a5a" stroke-width="0.4" opacity="0.4"/>
    <line x1="45"  y1="320" x2="455" y2="320" stroke="#1a3a5a" stroke-width="0.4" opacity="0.4"/>
    <line x1="45"  y1="360" x2="455" y2="360" stroke="#1a3a5a" stroke-width="0.4" opacity="0.4"/>
    <line x1="150" y1="145" x2="150" y2="490" stroke="#1a3a5a" stroke-width="0.4" opacity="0.4"/>
    <line x1="200" y1="145" x2="200" y2="490" stroke="#1a3a5a" stroke-width="0.4" opacity="0.4"/>
    <line x1="250" y1="145" x2="250" y2="490" stroke="#1a3a5a" stroke-width="0.4" opacity="0.4"/>
    <line x1="300" y1="145" x2="300" y2="490" stroke="#1a3a5a" stroke-width="0.4" opacity="0.4"/>
    <line x1="350" y1="145" x2="350" y2="490" stroke="#1a3a5a" stroke-width="0.4" opacity="0.4"/>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- SURFACE LINE — the material being ablated             -->
    <!-- ══════════════════════════════════════════════════════ -->
    <line x1="80"  y1="340" x2="420" y2="340"
      stroke="#2E86AB" stroke-width="1.8" opacity="0.7"/>
    <!-- Surface texture marks -->
    <line x1="100" y1="338" x2="100" y2="342" stroke="#2E86AB" stroke-width="1" opacity="0.4"/>
    <line x1="130" y1="338" x2="130" y2="342" stroke="#2E86AB" stroke-width="1" opacity="0.4"/>
    <line x1="160" y1="338" x2="160" y2="342" stroke="#2E86AB" stroke-width="1" opacity="0.4"/>
    <line x1="190" y1="338" x2="190" y2="342" stroke="#2E86AB" stroke-width="1" opacity="0.4"/>
    <line x1="220" y1="338" x2="220" y2="342" stroke="#2E86AB" stroke-width="1" opacity="0.4"/>
    <line x1="280" y1="338" x2="280" y2="342" stroke="#2E86AB" stroke-width="1" opacity="0.4"/>
    <line x1="310" y1="338" x2="310" y2="342" stroke="#2E86AB" stroke-width="1" opacity="0.4"/>
    <line x1="340" y1="338" x2="340" y2="342" stroke="#2E86AB" stroke-width="1" opacity="0.4"/>
    <line x1="370" y1="338" x2="370" y2="342" stroke="#2E86AB" stroke-width="1" opacity="0.4"/>
    <line x1="400" y1="338" x2="400" y2="342" stroke="#2E86AB" stroke-width="1" opacity="0.4"/>

    <!-- Ablation crater hint -->
    <ellipse cx="250" cy="341" rx="18" ry="4" fill="#000d1a" opacity="0.7"/>
    <ellipse cx="250" cy="341" rx="12" ry="2.5" fill="#001833" opacity="0.8"/>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- LASER BEAM — sharp downward, cyan-to-white            -->
    <!-- ══════════════════════════════════════════════════════ -->
    <!-- Outer soft glow — very faint wide beam -->
    <line x1="250" y1="155" x2="250" y2="335"
      stroke="#00E5FF" stroke-width="12" opacity="0.06" stroke-linecap="round"/>
    <!-- Mid glow -->
    <line x1="250" y1="155" x2="250" y2="336"
      stroke="#00E5FF" stroke-width="5" opacity="0.18" stroke-linecap="round"/>
    <!-- Core beam — sharp -->
    <line x1="250" y1="155" x2="250" y2="337"
      stroke="url(#beamgrad)" stroke-width="2" opacity="0.95" stroke-linecap="round"/>
    <!-- Inner hot core -->
    <line x1="250" y1="200" x2="250" y2="337"
      stroke="#ffffff" stroke-width="0.8" opacity="0.7" stroke-linecap="round"/>

    <!-- Beam source indicator — lens/aperture at top -->
    <ellipse cx="250" cy="158" rx="10" ry="5" fill="#0d1e3a" stroke="#00E5FF" stroke-width="1.5" opacity="0.85"/>
    <ellipse cx="250" cy="158" rx="5" ry="2.5" fill="#00E5FF" opacity="0.5"/>
    <circle  cx="250" cy="158" r="2" fill="#ffffff" opacity="0.8"/>
    <!-- Lens housing -->
    <rect x="232" y="148" width="36" height="12" rx="4" fill="#0d1e3a" stroke="#2E86AB" stroke-width="1.2" opacity="0.85"/>
    <line x1="240" y1="148" x2="240" y2="160" stroke="#2E86AB" stroke-width="0.6" opacity="0.4"/>
    <line x1="248" y1="148" x2="248" y2="160" stroke="#2E86AB" stroke-width="0.6" opacity="0.4"/>
    <line x1="256" y1="148" x2="256" y2="160" stroke="#2E86AB" stroke-width="0.6" opacity="0.4"/>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- PLASMA BURST — at surface impact point                 -->
    <!-- ══════════════════════════════════════════════════════ -->
    <!-- Outer halo -->
    <circle cx="250" cy="338" r="32" fill="url(#haloglow)" opacity="0.6"/>
    <!-- Mid glow -->
    <circle cx="250" cy="338" r="18" fill="#00B0CC" opacity="0.18"/>
    <!-- Core plasma -->
    <circle cx="250" cy="338" r="10" fill="url(#plasmagrad)" opacity="0.95"/>
    <!-- Hot centre -->
    <circle cx="250" cy="338" r="4"  fill="#ffffff" opacity="0.98"/>
    <!-- Spark particles radiating out -->
    <line x1="250" y1="338" x2="234" y2="326" stroke="#00E5FF" stroke-width="1.2" opacity="0.65" stroke-linecap="round"/>
    <line x1="250" y1="338" x2="266" y2="326" stroke="#00E5FF" stroke-width="1.2" opacity="0.65" stroke-linecap="round"/>
    <line x1="250" y1="338" x2="228" y2="330" stroke="#00E5FF" stroke-width="0.8" opacity="0.5"  stroke-linecap="round"/>
    <line x1="250" y1="338" x2="272" y2="330" stroke="#00E5FF" stroke-width="0.8" opacity="0.5"  stroke-linecap="round"/>
    <line x1="250" y1="338" x2="240" y2="322" stroke="#ffffff" stroke-width="0.7" opacity="0.45" stroke-linecap="round"/>
    <line x1="250" y1="338" x2="260" y2="322" stroke="#ffffff" stroke-width="0.7" opacity="0.45" stroke-linecap="round"/>
    <!-- Debris dots -->
    <circle cx="232" cy="325" r="1.5" fill="#00E5FF" opacity="0.7"/>
    <circle cx="268" cy="325" r="1.5" fill="#00E5FF" opacity="0.7"/>
    <circle cx="224" cy="332" r="1.2" fill="#ffffff"  opacity="0.55"/>
    <circle cx="276" cy="332" r="1.2" fill="#ffffff"  opacity="0.55"/>
    <circle cx="242" cy="320" r="1"   fill="#00E5FF" opacity="0.5"/>
    <circle cx="258" cy="320" r="1"   fill="#00E5FF" opacity="0.5"/>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- EMISSION SPECTRAL LINES — LIBS fingerprint           -->
    <!-- Fan upward from burst, each a distinct wavelength     -->
    <!-- ══════════════════════════════════════════════════════ -->

    <!-- Line 1 — cyan (e.g. Ca II 393 nm) -->
    <line x1="250" y1="330" x2="192" y2="195"
      stroke="#00E5FF" stroke-width="2.2" opacity="0.88" stroke-linecap="round"/>
    <line x1="250" y1="330" x2="192" y2="195"
      stroke="#00E5FF" stroke-width="5" opacity="0.12" stroke-linecap="round"/>
    <!-- wavelength tick + label -->
    <line x1="188" y1="191" x2="178" y2="191" stroke="#00E5FF" stroke-width="1.2" opacity="0.65"/>
    <text font-family="monospace" font-size="8" fill="#00E5FF" opacity="0.7" text-anchor="end" x="175" y="194">393 nm</text>

    <!-- Line 2 — green (e.g. Mg I 518 nm) -->
    <line x1="250" y1="330" x2="218" y2="188"
      stroke="#69F0AE" stroke-width="2.2" opacity="0.85" stroke-linecap="round"/>
    <line x1="250" y1="330" x2="218" y2="188"
      stroke="#69F0AE" stroke-width="5" opacity="0.1" stroke-linecap="round"/>
    <line x1="214" y1="184" x2="204" y2="184" stroke="#69F0AE" stroke-width="1.2" opacity="0.62"/>
    <text font-family="monospace" font-size="8" fill="#69F0AE" opacity="0.7" text-anchor="end" x="201" y="187">518 nm</text>

    <!-- Line 3 — amber (e.g. Na I 589 nm) -->
    <line x1="250" y1="330" x2="282" y2="188"
      stroke="#FFB300" stroke-width="2.2" opacity="0.85" stroke-linecap="round"/>
    <line x1="250" y1="330" x2="282" y2="188"
      stroke="#FFB300" stroke-width="5" opacity="0.1" stroke-linecap="round"/>
    <line x1="286" y1="184" x2="296" y2="184" stroke="#FFB300" stroke-width="1.2" opacity="0.62"/>
    <text font-family="monospace" font-size="8" fill="#FFB300" opacity="0.7" text-anchor="start" x="299" y="187">589 nm</text>

    <!-- Line 4 — red (e.g. H-alpha 656 nm) -->
    <line x1="250" y1="330" x2="308" y2="195"
      stroke="#FF5252" stroke-width="2.2" opacity="0.85" stroke-linecap="round"/>
    <line x1="250" y1="330" x2="308" y2="195"
      stroke="#FF5252" stroke-width="5" opacity="0.1" stroke-linecap="round"/>
    <line x1="312" y1="191" x2="322" y2="191" stroke="#FF5252" stroke-width="1.2" opacity="0.62"/>
    <text font-family="monospace" font-size="8" fill="#FF5252" opacity="0.7" text-anchor="start" x="325" y="194">656 nm</text>

    <!-- ══════════════════════════════════════════════════════ -->
    <!-- SPECTRUM BAR — bottom, showing emission peaks         -->
    <!-- ══════════════════════════════════════════════════════ -->
    <!-- Background spectrum bar -->
    <defs>
      <linearGradient id="specbar" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"   stop-color="#6600cc" stop-opacity="0.5"/>
        <stop offset="15%"  stop-color="#0044ff" stop-opacity="0.5"/>
        <stop offset="30%"  stop-color="#00aaff" stop-opacity="0.5"/>
        <stop offset="45%"  stop-color="#00E5FF" stop-opacity="0.6"/>
        <stop offset="55%"  stop-color="#69F0AE" stop-opacity="0.6"/>
        <stop offset="70%"  stop-color="#FFB300" stop-opacity="0.6"/>
        <stop offset="85%"  stop-color="#FF5252" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#880011" stop-opacity="0.4"/>
      </linearGradient>
    </defs>
    <rect x="90" y="395" width="320" height="6" rx="2" fill="url(#specbar)" opacity="0.75"/>

    <!-- Emission peaks on spectrum bar -->
    <!-- Ca II 393 nm — cyan -->
    <rect x="193" y="388" width="3" height="14" rx="1" fill="#00E5FF" opacity="0.9"/>
    <!-- Mg I 518 nm — green -->
    <rect x="228" y="389" width="3" height="12" rx="1" fill="#69F0AE" opacity="0.88"/>
    <!-- Na I 589 nm — amber -->
    <rect x="262" y="389" width="3" height="12" rx="1" fill="#FFB300" opacity="0.88"/>
    <!-- H-alpha 656 nm — red -->
    <rect x="296" y="388" width="3" height="14" rx="1" fill="#FF5252" opacity="0.9"/>

    <!-- axis labels -->
    <text font-family="monospace" font-size="7" fill="#4a7aaa" opacity="0.55" text-anchor="middle" x="90"  y="410">300</text>
    <text font-family="monospace" font-size="7" fill="#4a7aaa" opacity="0.55" text-anchor="middle" x="250" y="410">550</text>
    <text font-family="monospace" font-size="7" fill="#4a7aaa" opacity="0.55" text-anchor="middle" x="410" y="410">800 nm</text>
    <text font-family="monospace" font-size="7" fill="#4a7aaa" opacity="0.45" text-anchor="middle" x="250" y="420">emission spectrum</text>

    <!-- LIBS label -->
    <text font-family="monospace" font-size="8" fill="#2E86AB" opacity="0.55" text-anchor="middle" x="250" y="445">
      Laser-Induced Breakdown Spectroscopy
    </text>

  </g>

  <!-- Hex border — blue -->
  <polygon points="250,30 455,145 455,375 250,490 45,375 45,145"
    fill="none" stroke="#2E86AB" stroke-width="11" stroke-linejoin="round"/>
  <polygon points="250,44 441,153 441,367 250,476 59,367 59,153"
    fill="none" stroke="#5BA8C4" stroke-width="1.5" stroke-linejoin="round" opacity="0.5"/>

  <!-- Package name -->
  <text font-family="monospace" font-weight="700" font-size="27"
    fill="#7EC8E3" text-anchor="middle" x="250" y="545" letter-spacing="1">libscanR</text>
</svg>
